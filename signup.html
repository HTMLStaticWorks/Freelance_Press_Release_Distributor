<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | WirePress PR Platform</title>
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body class="bg-light">

    <div class="container d-flex flex-column min-vh-100 py-5">
        <div class="d-flex justify-content-end gap-2 mb-4">
            <button id="rtl-toggle" class="nav-utility-btn">RTL</button>
            <button id="theme-toggle" class="nav-utility-btn">
                <i class="bi bi-moon-fill"></i>
            </button>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7 col-xl-5">
                <div class="text-center mb-5">
                    <a href="index.html" class="navbar-brand justify-content-center pb-4">
                        <i class="bi bi-broadcast brand-logo-icon"></i>
                <span class="brand-wire">WIRE</span><span class="brand-press">PRESS</span>
                    </a>
                    <p class="text-secondary mt-2">Start Your Media Journey</p>
                </div>
                <div class="card p-4 border-0 shadow-lg">
                    <h4 class="mb-4 text-center">Create Your Account</h4>
                    <form class="needs-validation" novalidate>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label small fw-bold">First Name</label>
                                <input type="text" class="form-control" placeholder="Enter first name" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Last Name</label>
                                <input type="text" class="form-control" placeholder="Enter last name" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Work Email</label>
                                <input type="email" class="form-control" placeholder="Enter work email" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Company Name</label>
                                <input type="text" class="form-control" placeholder="Enter company name" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Password</label>
                                <div class="input-group">
                                    <input type="password" class="form-control border-end-0" placeholder="••••••••" required>
                                    <button class="btn btn-outline-secondary border-start-0 toggle-password" type="button" style="border-color: #dee2e6;">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="form-text small">Minimum 8 characters.</div>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Confirm Password</label>
                                <div class="input-group">
                                    <input type="password" class="form-control border-end-0" placeholder="••••••••" required>
                                    <button class="btn btn-outline-secondary border-start-0 toggle-password" type="button" style="border-color: #dee2e6;">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" required>
                                    <label class="form-check-label small text-secondary" for="terms">
                                        I agree to the <a href="#" class="text-accent text-decoration-none fw-bold">Terms of Service</a> and <a href="#" class="text-accent text-decoration-none fw-bold">Privacy Policy</a>
                                    </label>
                                </div>
                            </div>
                            <div class="col-12 mt-4">
                                <button class="btn btn-primary w-100 py-3 mb-4">Create Enterprise Account</button>
                            </div>
                        </div>
                    </form>

                    <div class="social-divider">
                        <hr>
                        <span>OR</span>
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button class="btn btn-social">
                            <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google" style="height: 18px;">
                            Sign up with Google
                        </button>
                        <button class="btn btn-social">
                            <img src="https://www.svgrepo.com/show/511330/apple-173.svg" alt="Apple" style="height: 18px;">
                            Sign up with Apple
                        </button>
                    </div>
                    <div class="text-center">
                        <span class="small text-secondary">Already have an account?</span>
                        <a href="login.html" class="small text-accent fw-bold text-decoration-none">Login Here</a>
                    </div>
                    </div>
                </div>
                <div class="text-center mt-5 mb-5">
                    <p class="small text-secondary">&copy; 2026 WirePress. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
</body>
</html>
