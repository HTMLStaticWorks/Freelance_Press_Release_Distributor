<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WirePress PR Dashboard</title>
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>

<body class="bg-light">

    <div class="container d-flex flex-column min-vh-100 justify-content-center py-5 position-relative">
        <div class="position-absolute top-0 end-0 p-4 mt-2">
            <button id="rtl-toggle" class="nav-utility-btn">RTL</button><button id="theme-toggle" class="nav-utility-btn">
                <i class="bi bi-moon-fill"></i>
            </button>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="text-center mb-5">
                    <a href="index.html" class="navbar-brand justify-content-center pb-4">
                        <i class="bi bi-broadcast brand-logo-icon"></i>
                <span class="brand-wire">WIRE</span><span class="brand-press">PRESS</span>
                    </a>
                    <p class="text-secondary mt-2">Enterprise PR Management</p>
                </div>
                <div class="card p-4 border-0 shadow-lg">
                    <h4 class="mb-4 text-center">Account Login</h4>
                    <form class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Work Email</label>
                            <input type="email" class="form-control" placeholder="name@company.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="mb-4 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label small text-secondary" for="remember">
                                    Remember Me
                                </label>
                            </div>
                            <a href="#" class="small text-accent text-decoration-none fw-bold">Forgot Password?</a>
                        </div>
                        <button class="btn btn-primary w-100 py-3 mb-4">Access Dashboard</button>
                    </form>
                    
                    <div class="social-divider">
                        <hr>
                        <span>OR</span>
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button class="btn btn-social">
                            <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google" style="height: 18px;">
                            Continue with Google
                        </button>
                        <button class="btn btn-social">
                            <img src="https://www.svgrepo.com/show/511330/apple-173.svg" alt="Apple" style="height: 18px;">
                            Continue with Apple
                        </button>
                    </div>
                    <div class="text-center">
                        <span class="small text-secondary">New to WirePress?</span>
                        <a href="signup.html" class="small text-accent fw-bold text-decoration-none">Create an
                            Account</a>
                    </div>
                </div>
                <div class="text-center mt-5 mb-5">
                    <p class="small text-secondary">&copy; 2026 WirePress. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
<script src="assets/js/rtl-toggle.js"></script></body>

</html>
